data:
  raw_path: "https://raw.githubusercontent.com/plotly/datasets/master/diabetes.csv"
  target_column: "Outcome"

preprocessing:
  handle_missing: "median"
  scale_features: true
  test_size: 0.2
  random_state: 42

model:
  type: "RandomForestClassifier"
  params:
    n_estimators: 200
    max_depth: 8
    random_state: 42

training:
  min_accuracy: 0.60
  min_f1: 0.55

mlflow:
  tracking_uri: "file:./mlruns"
  experiment_name: "diabetes-prediction"

sweep:
  parameters:
    n_estimators: [50, 100, 200]
    max_depth: [4, 6, 8]
    min_samples_split: [2, 4, 6]
